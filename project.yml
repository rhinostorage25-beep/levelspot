# XcodeGen project definition. On a Mac: `brew install xcodegen && xcodegen generate`
# then open LevelSpot.xcodeproj. Keeping the project declarative means no binary
# project.pbxproj merge pain and the whole tree stays reviewable as text.
name: LevelSpot
options:
  bundleIdPrefix: uk.co.levelspot
  deploymentTarget:
    iOS: "17.0"
  # NOTE: this does NOT control the pbxproj format XcodeGen emits (an earlier fix here
  # assumed it did, and was wrong - the "future Xcode project file format" error persisted
  # with this set to 15.4). It's purely metadata (LastUpgradeCheck / display info). The
  # actual fix for CI is in .github/workflows/ios-build.yml: select a current Xcode via
  # maxim-lobanov/setup-xcode before generating, rather than trying to pin an old format.
  xcodeVersion: "16.0"
packages:
  LevelSpotCore:
    path: LevelSpotCore
targets:
  LevelSpot:
    type: application
    platform: iOS
    sources:
      - LevelSpot
    dependencies:
      - package: LevelSpotCore
    info:
      path: LevelSpot/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: LevelSpot
        NSLocationWhenInUseUsageDescription: >-
          LevelSpot uses your position only to recognise pitches you have levelled before.
          Nothing is shared with other users.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.co.levelspot.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Manual signing for Codemagic: fetch-signing-files creates the profile, and
        # `xcode-project use-profiles` injects the PROVISIONING_PROFILE_SPECIFIER — but it
        # needs the team + manual style present in the generated project to bind it, otherwise
        # archive fails with "requires a provisioning profile". (Team = Jonathan Davis, B58BTCVS53.)
        DEVELOPMENT_TEAM: B58BTCVS53
        CODE_SIGN_STYLE: Manual
schemes:
  LevelSpot:
    build:
      targets:
        LevelSpot: all
    test:
      targets:
        - package: LevelSpotCore/LevelSpotCoreTests
